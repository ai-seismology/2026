  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

"0.4\" opacity=\"0.05\"><\u002Fcircle>\n      <path d=\"{{ waveSub }}\" fill=\"none\" stroke=\"#B8CD96\" stroke-width=\"1\" opacity=\"0.22\"><\u002Fpath>\n      <path d=\"{{ waveMain }}\" fill=\"none\" stroke=\"#E8842A\" stroke-width=\"1.6\" opacity=\"0.4\"><\u002Fpath>\n    <\u002Fsvg>\n  <\u002Fdiv>\n\n  <div style=\"position: relative; z-index: 1; max-width: 880px; margin: 0 auto; padding: 1.5rem 2.5rem 4rem; width: 100%;\">\n    <p style=\"margin: 0 0 1.8rem; font-size: 0.74rem; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase; color: #E8842A; opacity: 0; animation: fadeUp 0.6s 0.1s forwards;\">One-day workshop &nbsp;·&nbsp; London, UK<\u002Fp>\n    <h1 style=\"margin: 0 0 1.4rem; font-family: 'DM Serif Display', serif; font-size: clamp(3rem, 6.5vw, 5.4rem); line-height: 1.05; color: #F7F4EC; font-weight: 400; opacity: 0; animation: fadeUp 0.7s 0.25s forwards;\">AI <em style=\"color: #E8842A;\">for<\u002Fem> Seismology<\u002Fh1>\n    <p style=\"margin: 0 0 0.4rem; font-size: 1.5rem; color: #B8CD96; font-weight: 300; opacity: 0; animation: fadeUp 0.7s 0.4s forwards;\">16<sup style=\"font-size: 0.6em;\">th<\u002Fsup> September 2026<\u002Fp>\n    <p style=\"margin: 0 0 2.2rem; font-size: 0.85rem; letter-spacing: 0.14em; text-transform: uppercase; color: rgba(245,242,234,0.55); opacity: 0; animation: fadeUp 0.7s 0.5s forwards;\">Room 3, Stewart House &nbsp;·&nbsp; Senate House &nbsp;·&nbsp; London<\u002Fp>\n    <p style=\"margin: 0 0 2.6rem; font-size: 1.02rem; color: rgba(245,242,234,0.6); max-width: 580px; font-weight: 300; opacity: 0; animation: fadeUp 0.7s 0.6s forwards;\">Bringing together academics and industry stakeholders to explore the frontiers of artificial intelligence in seismic research and geophysical applications.<\u002Fp>\n    <div style=\"display: flex; gap: 1rem; flex-wrap: wrap; opacity: 0; animation: fadeUp 0.7s 0.72s forwards;\">\n      <a href=\"https://www.eventbrite.co.uk/e/1993446379784?aff=oddtdtcreator\" target=\"_blank\" style=\"background: #E8842A; color: #171A12; font-size: 0.86rem; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 30px; border-radius: 100px; display: inline-block; transition: background 0.2s;\" style-hover=\"background: #F09A48; color: #171A12;\">Register — Free<\u002Fa>\n      <sc-if value=\"{{ showProgramme }}\" hint-placeholder-val=\"{{ false }}\"><a href=\"#programme\" style=\"border: 1px solid rgba(245,242,234,0.3); color: rgba(245,242,234,0.85); font-size: 0.86rem; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; padding: 14px 30px; border-radius: 100px; display: inline-block; transition: border-color 0.2s;\" style-hover=\"border-color: rgba(245,242,234,0.8); color: #fff;\">View programme<\u002Fa><\u002Fsc-if>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<!-- OVERVIEW -->\n<section id=\"overview\" data-screen-label=\"Overview\" style=\"padding: 5.5rem 2.5rem; background: #F5F2EA;\">\n  <div style=\"max-width: 920px; margin: 0 auto;\">\n    <p style=\"margin: 0 0 0.7rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #C96A1E;\">About the workshop<\u002Fp>\n    <h2 style=\"margin: 0 0 1.8rem; font-family: 'DM Serif Display', serif; font-size: clamp(1.9rem, 3.5vw, 2.6rem); color: #23271B; font-weight: 400; line-height: 1.2;\">Overview<\u002Fh2>\n    <p style=\"margin: 0 0 1.3rem; font-size: 1.05rem; color: #4E4A3A; line-height: 1.85; max-width: 720px;\">This one-day workshop brings together leading academics and industry stakeholders to explore how artificial intelligence and machine learning techniques are transforming seismological research — from earthquake detection and source characterisation to subsurface imaging and hazard assessment.<\u002Fp>\n    <p style=\"margin: 0 0 2.2rem; font-size: 0.95rem; color: #6E6A58; line-height: 1.8; max-width: 720px;\">The workshop aims to foster dialogue between academia and industry, accelerate knowledge exchange, and identify open challenges at the intersection of AI, seismology and underground energy storage.<\u002Fp>\n\n    <p style=\"margin: 0 0 0.9rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #8A8570;\">Topics include<\u002Fp>\n    <div style=\"display: flex; flex-wrap: wrap; gap: 0.6rem; margin-bottom: 3rem;\">\n      <span style=\"background: #E7E9D8; color: #4A5530; font-size: 0.82rem; font-weight: 500; padding: 6px 15px; border-radius: 100px;\">Deep learning for seismic data<\u002Fspan>\n      <span style=\"background: #E7E9D8; color: #4A5530; font-size: 0.82rem; font-weight: 500; padding: 6px 15px; border-radius: 100px;\">Earthquake detection<\u002Fspan>\n      <span style=\"background: #E7E9D8; color: #4A5530; font-size: 0.82rem; font-weight: 500; padding: 6px 15px; border-radius: 100px;\">Subsurface imaging<\u002Fspan>\n      <span style=\"background: #E7E9D8; color: #4A5530; font-size: 0.82rem; font-weight: 500; padding: 6px 15px; border-radius: 100px;\">Physics-informed ML for seismic hazard<\u002Fspan>\n      <span style=\"background: #E7E9D8; color: #4A5530; font-size: 0.82rem; font-weight: 500; padding: 6px 15px; border-radius: 100px;\">Source characterisation<\u002Fspan>\n      <span style=\"background: #E7E9D8; color: #4A5530; font-size: 0.82rem; font-weight: 500; padding: 6px 15px; border-radius: 100px;\">Industry applications<\u002Fspan>\n    <\u002Fdiv>\n\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 1.25rem;\">\n      <div style=\"background: #FDFBF6; border: 1px solid #E5E0D2; border-radius: 10px; padding: 1.75rem;\">\n        <p style=\"margin: 0 0 0.6rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #C96A1E;\">Format · 01<\u002Fp>\n        <h3 style=\"margin: 0 0 0.6rem; font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: #23271B; font-weight: 400;\">Academic talks<\u002Fh3>\n        <p style=\"margin: 0; font-size: 0.9rem; color: #6E6A58; line-height: 1.7;\">Invited presentations from researchers at the forefront of AI-driven seismology, covering methodological advances and real-world applications.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #FDFBF6; border: 1px solid #E5E0D2; border-radius: 10px; padding: 1.75rem;\">\n        <p style=\"margin: 0 0 0.6rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #C96A1E;\">Format · 02<\u002Fp>\n        <h3 style=\"margin: 0 0 0.6rem; font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: #23271B; font-weight: 400;\">Industry insight<\u002Fh3>\n        <p style=\"margin: 0; font-size: 0.9rem; color: #6E6A58; line-height: 1.7;\">Stakeholder contributions from Shell, the NSTA and other industry partners sharing operational challenges and opportunities for AI integration.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"background: #FDFBF6; border: 1px solid #E5E0D2; border-radius: 10px; padding: 1.75rem;\">\n        <p style=\"margin: 0 0 0.6rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: #C96A1E;\">Format · 03<\u002Fp>\n        <h3 style=\"margin: 0 0 0.6rem; font-family: 'DM Serif Display', serif; font-size: 1.15rem; color: #23271B; font-weight: 400;\">Panel discussion<\u002Fh3>\n        <p style=\"margin: 0; font-size: 0.9rem; color: #6E6A58; line-height: 1.7;\">An open forum exploring the future of AI in seismology, barriers to adoption, reproducibility, and the path to operational deployment.<\u002Fp>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- SPEAKERS -->\n<section id=\"speakers\" data-screen-label=\"Speakers\" style=\"padding: 5.5rem 2.5rem; background: #1B2013;\">\n  <div style=\"max-width: 920px; margin: 0 auto;\">\n    <p style=\"margin: 0 0 0.7rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppe ansform: uppercase; color: rgba(245,242,234,0.35);\">To be confirmed<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <p style=\"margin: 2.2rem 0 0; font-size: 0.85rem; color: rgba(245,242,234,0.4); font-style: italic;\">Speaker list will be updated as confirmations are received.<\u002Fp>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- PROGRAMME -->\n<sc-if value=\"{{ showProgramme }}\" hint-placeholder-val=\"{{ false }}\">\n<section id=\"programme\" data-screen-label=\"Programme\" style=\"padding: 5.5rem 2.5rem; background: #EDE9DD;\">\n  <div style=\"max-width: 860px; margin: 0 auto;\">\n    <p style=\"margin: 0 0 0.7rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #C96A1E;\">Draft schedule<\u002Fp>\n    <h2 style=\"margin: 0 0 2.2rem; font-family: 'DM Serif Display', serif; font-size: clamp(1.9rem, 3.5vw, 2.6rem); color: #23271B; font-weight: 400; line-height: 1.2;\">Programme<\u002Fh2>\n    <div style=\"background: #FDFBF6; border: 1px solid #E0DACB; border-radius: 10px; overflow: hidden;\">\n      <sc-for list=\"{{ sessions }}\" as=\"s\" hint-placeholder-count=\"6\">\n        <div style=\"display: grid; grid-template-columns: 90px 130px 1fr; gap: 1rem; align-items: baseline; padding: 1rem 1.5rem; border-bottom: 1px solid #F0EAE0;\">\n          <div style=\"font-weight: 700; color: #4A5530; font-size: 0.88rem; font-variant-numeric: tabular-nums;\">{{ s.time }}<\u002Fdiv>\n          <div><span style=\"{{ s.badgeStyle }}\">{{ s.type }}<\u002Fspan><\u002Fdiv>\n          <div>\n            <div style=\"font-weight: 500; color: #23271B; font-size: 0.95rem;\">{{ s.title }}<\u002Fdiv>\n            <sc-if value=\"{{ s.speaker }}\" hint-placeholder-val=\"{{ true }}\">\n              <div style=\"font-size: 0.82rem; color: #8A8570; margin-top: 1px;\">{{ s.speaker }}<\u002Fdiv>\n            <\u002Fsc-if>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n    <p style=\"margin: 1rem 0 0; font-si Fdiv>\n            <p style=\"margin: 0; font-size: 0.9rem; color: #4E4A3A;\"><a href=\"mailto:Alessio.SpurioMancini@rhul.ac.uk\">Alessio.SpurioMancini@rhul.ac.uk<\u002Fa><\u002Fp>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- VENUE -->\n<section id=\"venue\" data-screen-label=\"Venue\" style=\"padding: 5.5rem 2.5rem; background: #2A3220;\">\n  <div style=\"max-width: 920px; margin: 0 auto;\">\n    <p style=\"margin: 0 0 0.7rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #B8CD96;\">Getting here<\u002Fp>\n    <h2 style=\"margin: 0 0 2.2rem; font-family: 'DM Serif Display', serif; font-size: clamp(1.9rem, 3.5vw, 2.6rem); color: #F7F4EC; font-weight: 400; line-height: 1.2;\">Venue<\u002Fh2>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 3rem; align-items: start;\">\n      <div>\n        <h3 style=\"margin: 0 0 0.5rem; font-family: 'DM Serif Display', serif; font-size: 1.5rem; color: #F7F4EC; font-weight: 400;\">Room 3, Stewart House<\u002Fh3>\n        <p style=\"margin: 0 0 1.6rem; color: rgba(245,242,234,0.65); font-size: 0.92rem; line-height: 1.75;\">The workshop will be held in Room 3, Stewart House — part of the Senate House complex in Bloomsbury, central London. The venue is easily accessible by public transport and a short walk from several major tube stations.<\u002Fp>\n        <div style=\"display: flex; flex-direction: column; gap: 0.9rem;\">\n          <div style=\"display: grid; grid-template-columns: 110px 1fr; gap: 0.8rem;\">\n            <div style=\"font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; color: #B8CD96; padding-top: 3px;\">Address<\u002Fdiv>\n            <p style=\"margin: 0; font-size: 0.88rem; color: rgba(245,242,234,0.75);\">Stewart House, 32 Russell Square, Bloomsbury, London WC1B 5DN<\u002Fp>\n          <\u002Fdiv>\n 340px; border: 1px solid rgba(245,242,234,0.2); border-radius: 10px; background: rgba(0,0,0,0.2);\" title=\"Map — Stewart House, Russell Square\"><\u002Fiframe>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ORGANISERS -->\n<section id=\"organisers\" data-screen-label=\"Organisers\" style=\"padding: 5.5rem 2.5rem; background: #F5F2EA;\">\n  <div style=\"max-width: 920px; margin: 0 auto;\">\n    <p style=\"margin: 0 0 0.7rem; font-size: 0.72rem; font-weight: 600; letter-spacing: 0.18em; text-transform: uppercase; color: #C96A1E;\">Who's behind this<\u002Fp>\n    <h2 style=\"margin: 0 0 1.4rem; font-family: 'DM Serif Display', serif; font-size: clamp(1.9rem, 3.5vw, 2.6rem); color: #23271B; font-weight: 400; line-height: 1.2;\">Organisers<\u002Fh2>\n    <p style=\"margin: 0 0 2rem; font-size: 0.95rem; color: #6E6A58; max-width: 640px;\">Jointly organised by the Department of Physics and the Department of Earth Sciences at Royal Holloway, University of London.<\u002Fp>\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.25rem;\">\n      <div style=\"background: #FDFBF6; border: 1px solid #E5E0D2; border-radius: 10px; padding: 1.6rem;\">\n        <div style=\"font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #23271B; margin-bottom: 3px;\"><a href=\"https://pure.royalholloway.ac.uk/en/persons/alessio-spurio-mancini/\" style=\"color: #23271B;\" style-hover=\"color: #C96A1E;\">Dr Alessio Spurio Mancini<\u002Fa><\u002Fdiv>\n        <div style=\"font-size: 0.8rem; color: #8A8570; line-height: 1.5;\">Dept. of Physics<br>Royal Holloway, University of London<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #FDFBF6; border: 1px solid #E5E0D2; border-radius: 10px; padding: 1.6rem;\">\n        <div style=\"font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #23271B; margin-bottom: 3px;\"><a href=\"https://pure.royalholloway.ac.uk/en/persons/jonathan-paul/\" style=\"color: #23271B;\" style-hover=\"color: #C96A1E;\">Dr Jonathan Paul<\u002Fa><\u002Fdiv>\n        <div style=\"font-size: 0.8rem; color: #8A8570; line-height: 1.5;\">Dept. of Earth Sciences<br>Royal Holloway, University of London<\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"background: #FDFBF6; border: 1px solid #E5E0D2; border-radius: 10px; padding: 1.6rem;\">\n        <div style=\"font-family: 'DM Serif Display', serif; font-size: 1.1rem; color: #23271B; margin-bottom: 3px;\">Carolina M. García López<\u002Fdiv>\n        <div style=\"font-size: 0.8rem; color: #8A8570; line-height: 1.5;\">Dept. of Physics<br>Royal Holloway, University of London<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- FOOTER -->\n<footer style=\"background: #12150D; color: rgba(245,242,234,0.45); text-align: center; padding: 2.5rem; font-size: 0.82rem; line-height: 1.9;\">\n  <p style=\"margin: 0;\"><strong style=\"color: rgba(245,242,234,0.75);\">AI <em style=\"color: #E8842A;\">for<\u002Fem> Seismology<\u002Fstrong> · 16 September 2026 · Stewart House, London<\u002Fp>\n  <p style=\"margin: 0.4rem 0 0;\">Organised by the <a href=\"https://www.royalholloway.ac.uk/research-and-teaching/departments-and-schools/physics/\" style=\"color: rgba(245,242,234,0.6);\">Dept. of Physics<\u002Fa> &amp; <a href=\"https://www.royalholloway.ac.uk/research-and-teaching/departments-and-schools/earth-sciences/\" style=\"color: rgba(245,242,234,0.6);\">Dept. of Earth Sciences<\u002Fa>, Royal Holloway, University of London<\u002Fp>\n  <p style=\"margin: 0.4rem 0 0;\"><a href=\"https://ai-seismology.github.io/2026\" style=\"color: #B8CD96;\">ai-seismology.github.io/2026<\u002Fa> · <a href=\"mailto:Alessio.SpurioMancini@rhul.ac.uk\" style=\"color: rgba(245,242,234,0.6);\">Alessio.SpurioMancini@rhul.ac.uk<\u002Fa><\u002Fp>\n<\u002Ffooter>\n\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;showProgramme&quot;: {&quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Content&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const badge = (bg, fg) => `display:inline-block;font-size:0.68rem;font-weight:700;letter-spacing:0.08em;text-transform:uppercase;padding:3px 11px;border-radius:100px;background:${bg};color:${fg};`;\n    const talk = badge('#E7E9D8', '#4A5530');\n    const brk = badge('#F0EAE0', '#8A8570');\n    const key = badge('#F6E2CF', '#C96A1E');\n    const panel = badge('#DFE4EC', '#3A4D6B');\n\n    const speakers = [\n      { initials: 'AF', name: 'Ana Ferreira', role: 'Professor of Seismology', org: 'UCL' },\n      { initials: 'AT', name: 'Andy Thompson', role: 'Head of Product Services', org: 'NSTA' },\n      { initials: 'CW', name: 'Chris Willacy', role: 'Principal Research Geophysicist', org: 'Shell' },\n      { initials: 'AS', name: 'Alex Saoulis', role: 'PhD Student', org: 'UCL' },\n    ];\n\n    const wave = (yc, packets, lambda, phase) => {\n      let d = '';\n      for (let x = 0; x <= 1400; x += 4) {\n        let amp = 0;\n        for (const p of packets) amp += p.a * Math.exp(-(((x - p.c) / p.w) ** 2));\n        const y = yc + amp * Math.sin(x / lambda + phase);\n        d += (x === 0 ? 'M' : 'L') + x + ',' + y.toFixed(1);\n      }\n      return d;\n    };\n    const waveMain = wave(210, [{ c: 360, a: 110, w: 130 }, { c: 960, a: 85, w: 110 }], 13, 0);\n    const waveSub = wave(218, [{ c: 400, a: 40, w: 160 }, { c: 1000, a: 30, w: 140 }], 17, 1.2);\n\n    const sessions = [\n      { time: '09:00', type: 'Arrival', badgeStyle: brk, title: 'Registration & morning coffee', speaker: '' },\n      { time: '09:30', type: 'Opening', badgeStyle: key, title: 'Welcome & project introduction', speaker: 'Organising committee, Royal Holloway, University of London' },\n      { time: '10:00', type: 'Keynote', badgeStyle: key, title: 'Keynote — TBC', speaker: 'Andy Thompson, NSTA' },\n      { time: '10:45', type: 'Talk', badgeStyle: talk, title: 'Full-waveform earthquake source inversion using simulation-based inference', speaker: 'Alex Saoulis, UCL' },\n      { time: '11:15', type: 'Break', badgeStyle: brk, title: 'Coffee & snacks', speaker: '' },\n      { time: '11:35', type: 'Talk', badgeStyle: talk, title: 'Academic presentation — TBC', speaker: 'Ana Ferreira, UCL' },\n      { time: '12:05', type: 'Industry', badgeStyle: talk, title: 'Industry perspective — Shell', speaker: 'Chris Willacy, Shell' },\n      { time: '12:35', type: 'Lunch', badgeStyle: brk, title: 'Lunch & refreshments', speaker: '' },\n      { time: '13:45', type: 'Talk', badgeStyle: talk, title: 'Academic presentation — TBC', speaker: 'To be confirmed' },\n      { time: '14:15', type: 'Talk', badgeStyle: talk, title: 'Academic presentation — TBC', speaker: 'To be confirmed' },\n      { time: '14:45', type: 'Break', badgeStyle: brk, title: 'Afternoon coffee break', speaker: '' },\n      { time: '15:05', type: 'Panel', badgeStyle: panel, title: 'Panel discussion: the future of AI in seismology', speaker: 'Chaired by Dr Alessio Spurio Mancini' },\n      { time: '16:15', type: 'Closing', badgeStyle: key, title: 'Closing remarks', speaker: 'Organising committee' },\n    ];\n\n    const showProgramme = this.props.showProgramme ?? false;\n    return { speakers, sessions: showProgramme ? sessions : [], showProgramme, waveMain, waveSub };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
